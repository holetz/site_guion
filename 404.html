<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Guion</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif; background: #111216; color: #b4b9c8;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .wrap { max-width: 480px; }
    .code { font-family: 'Sora', sans-serif; font-size: 6rem; font-weight: 700; color: #1FA5A5; line-height: 1; margin-bottom: 16px; }
    h1 { font-family: 'Sora', sans-serif; font-size: 1.4rem; color: #f4f5f7; margin-bottom: 12px; }
    p { font-size: 1rem; margin-bottom: 32px; line-height: 1.7; }
    a {
      font-family: 'Sora', sans-serif; font-size: 0.95rem; font-weight: 600;
      color: #111216; background: #1FA5A5; padding: 14px 32px; border-radius: 10px;
      text-decoration: none; display: inline-block; transition: all 0.3s;
    }
    a:hover { background: #25C4C4; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>A página que você está procurando não existe ou foi movida.</p>
    <a href="/">Voltar ao Início</a>
  </div>
</body>
</html>
